<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table{
            border:1px solid black;
            border-collapse: collapse;
            width:100%;;
            font-family: Arial,sans-serif;

        }
   th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .total-row {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Employee Salary Information</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Department</th>
                <th>Position</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ahmed Ali</td>
                <td>Engineering</td>
                <td>Software Engineer</td>
                <td>$85,000</td>
            </tr>
            <tr>
                <td>Solomon Kebede</td>
                <td>Marketing</td>
                <td>Marketing Manager</td>
                <td>$75,000</td>
            </tr>
            <tr>
                <td>Hana Tamiru</td>
                <td>Finance</td>
                <td>Accountant</td>
                <td>$65,000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3">Total Salary</td>
                <td>$225,000</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
