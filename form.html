<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student registration
    </title>
    <style>
        body {font-family: serif ; padding:20px;}
        .form-group {margin-bottom:10px}
        label{margin-bottom:5px;}
        fieldset {margin-bottom: 20px;border: 1px solid #ccc;}
        legend {font-weight: bold;}
        .row {display:flex; flex-wrap:wrap;gap:20px; margin-bottom:10px}
        .column {display: flex; align-items: center;}
        textarea {vertical-align: top;}
    </style>
</head>
<body>
    <h1>Student Registration Form</h1>

    <form>
        <fieldset>
            <legend>Personal Information</legend>
            <div class="row">
                <div class="column">
                    <lable for="fullname">Full Name</lable>
                    <input type="text" id="fullname" name="fullname">
                </div>
                <div class ="column">
                    <label for="dob">Date of Birth :</label>
                    <input type="date" id="dob" name="dob">
                </div>
            </div>

            <div class="row">
                <div class="column">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="column">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" value ="+251-912-345678">
                </div>
            </div>
               <div class ="row">
                <div class="column">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password">
                </div>
                <div class="column">
                    <label for="age">Age:</label>
                    <input type="number" id="age" name="age" style="width: 50;">
                </div>
            </div>
            <div class="row">
                <div class="column">
                  <label>Gender:</label>
                  <input type="radio" id="male" name="gender" value="male">
                  <label for="male">Male</label>
                  <input type="radio" id="female" name="gender" value="female">
                  <label for="female">Female</label>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Courses</legend>
            <p>Courses Interested:</p>
            <input type ="checkbox" id="cs" name ="course" value="cs">
            <label for="cs">Computer Science</label><br>    
            <input type ="checkbox" id ="is" name="course" value="is">
            <label for="is">Information Systems</label>
            <input type ="checkbox" id="se" name="course" value="se">
            <label for="se">Software Engineering</label><br>
        </fieldset>

        <fieldset>
            <legend> Other Information</legend>
            <div class ="row"></div>
            <div class="column">
                <label for="color">Favorite Color :</label>
                <input type="color" id="color" name="color" value="#000000">
            </div>
            <div class="column">
                <label for="marks">Expected Marks:</label>
                <input type="range" id="marks" name="marks" min="0" max="100">
            </div>
            </div>
            <div class="row">
                <div class="column">
                    <label for="url">Portfolio URL:</label>
                    <input type="url" id="url" name="url" placeholder="https://example.com">
                </div>
                <div class="column">
                    <label for="photo">Upload Photo:</label>
                    <input type="file" id="photo" name="photo" >
                </div>
                </div>
                <div class="row">
                    <div class="column">
                        <lable for ="search">Search Something</lable>
                        <input type="search" id="search" name="search">
                    </div>
                    <div class="column">
                        <label for="address">Address:</label>
                        <textarea id="address" name ="address" rows="2" cols="30"></textarea>
                    </div>
                    </div>
                
                
        </fieldset>
        <div class="form-group">
            <button type ="submit">Register</button>
            <button type ="reset">Reset</button>
        </div>

        <div style="margin-top: 20px;">
            <button type ="button">Link to  audio and video</button>
        </div>
    </form>
    
</body>
</html>
